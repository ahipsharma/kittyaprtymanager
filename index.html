
<!DOCTYPE html>
<html>
<head>
  <title>Kitty Party Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8e8ff, #e0c3fc);
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #4b0082;
      margin-bottom: 30px;
    }

    .card {
      max-width: 750px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #6a0dad;
    }

    input[type="date"],
    input[type="number"] {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      width: 130px;
    }

    input:focus {
      border-color: #6a0dad;
    }

    .member-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .member-name {
      font-weight: 500;
    }

    .total-box {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: right;
      color: #4b0082;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      margin-top: 15px;
      margin-right: 10px;
    }

    .btn-primary {
      background: #6a0dad;
      color: white;
    }

    .btn-secondary {
      background: #e0c3fc;
      color: #4b0082;
    }

    .btn-danger {
      background: #ff4d6d;
      color: white;
      padding: 6px 12px;
      font-size: 13px;
      margin-top: 10px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .past-entry {
      background: #faf5ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      border-left: 5px solid #6a0dad;
    }

    .past-entry ul {
      padding-left: 18px;
      margin: 8px 0;
    }

    @media (max-width: 600px) {
      .member-row {
        flex-direction: column;
        align-items: flex-start;
      }

      input[type="number"] {
        width: 100%;
        margin-top: 5px;
      }
    }
  </style>
</head>
<body>

<h1>🌸 Kitty Party Manager</h1>

<div class="card">
  <div class="section-title">New Party Entry</div>

  <label>Date:</label>
  <input type="date" id="partyDate"><br><br>

  <div id="membersContainer"></div>

  <div class="total-box">
    Total Collected: ₹ <span id="totalAmount">0</span>
  </div>

  <button class="btn btn-primary" onclick="saveParty()">Save Party</button>
</div>

<div class="card">
  <button class="btn btn-secondary" onclick="togglePast()">View Past Kitty Parties</button>
  <div id="pastContainer" style="display:none; margin-top:15px;"></div>
</div>

<script>
const members = [
    "Aparna",
    "Savita",
    "Sunita",
    "Pooja",
];

const container = document.getElementById("membersContainer");
const totalDisplay = document.getElementById("totalAmount");

members.forEach(member => {
  const row = document.createElement("div");
  row.className = "member-row";

  row.innerHTML = `
    <div class="member-name">${member}</div>
    <input type="number" min="0" placeholder="₹ Amount" id="${member}" oninput="calculateTotal()">
  `;

  container.appendChild(row);
});

function calculateTotal() {
  let total = 0;
  members.forEach(member => {
    const val = document.getElementById(member).value;
    total += Number(val) || 0;
  });
  totalDisplay.textContent = total;
}

function saveParty() {
  const date = document.getElementById("partyDate").value;
  if (!date) {
    alert("Please select date.");
    return;
  }

  let partyData = {
    date: date,
    members: []
  };

  members.forEach(member => {
    const amount = document.getElementById(member).value;
    if (amount && Number(amount) > 0) {
      partyData.members.push({
        name: member,
        amount: Number(amount)
      });
    }
  });

  let pastParties = JSON.parse(localStorage.getItem("kittyParties")) || [];
  pastParties.push(partyData);
  localStorage.setItem("kittyParties", JSON.stringify(pastParties));

  alert("Party Saved Successfully 🎉");
  location.reload();
}

function togglePast() {
  const pastContainer = document.getElementById("pastContainer");

  if (pastContainer.style.display === "none") {
    displayPast();
    pastContainer.style.display = "block";
  } else {
    pastContainer.style.display = "none";
  }
}

function displayPast() {
  const pastContainer = document.getElementById("pastContainer");
  pastContainer.innerHTML = "";

  let pastParties = JSON.parse(localStorage.getItem("kittyParties")) || [];

  pastParties.slice().reverse().forEach((party, index) => {
    let div = document.createElement("div");
    div.className = "past-entry";

    let total = 0;
    let membersList = party.members.map(m => {
      total += m.amount;
      return `<li>${m.name} - ₹${m.amount}</li>`;
    }).join("");

    div.innerHTML = `
      <strong>Date:</strong> ${party.date}
      <ul>${membersList}</ul>
      <strong>Total:</strong> ₹${total}<br>
      <button class="btn-danger" onclick="deleteParty(${pastParties.length - 1 - index})">Delete</button>
    `;

    pastContainer.appendChild(div);
  });
}

function deleteParty(index) {
  if (!confirm("Are you sure you want to delete this party?")) return;

  let pastParties = JSON.parse(localStorage.getItem("kittyParties")) || [];
  pastParties.splice(index, 1);
  localStorage.setItem("kittyParties", JSON.stringify(pastParties));

  displayPast();
}
</script>

</body>
</html>
