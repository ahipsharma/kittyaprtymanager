<!DOCTYPE html>
<html>

<head>
  <title>Kitty Party Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8e8ff, #e0c3fc);
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #4b0082;
      margin-bottom: 30px;
    }

    .card {
      max-width: 750px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
    }

    .member-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    input[type="date"],
    input[type="number"] {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      width: 130px;
    }

    .total-box {
      margin-top: 20px;
      font-weight: bold;
      text-align: right;
      color: #4b0082;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      margin-top: 15px;
    }

    .btn-primary {
      background: #6a0dad;
      color: white;
    }

    .btn-danger {
      background: #ff4d6d;
      color: white;
      padding: 6px 12px;
      font-size: 13px;
      margin-top: 10px;
    }

    .past-entry {
      background: #faf5ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      border-left: 5px solid #6a0dad;
    }
  </style>
</head>

<body>

  <h1>🌸 Kitty Party Manager</h1>

  <div class="card">
    <label>Date:</label>
    <input type="date" id="partyDate"><br><br>
    <div id="membersContainer"></div>
    <div class="total-box">
      Total Collected: ₹ <span id="totalAmount">0</span>
    </div>
    <button class="btn btn-primary" onclick="saveParty()">Save Party</button>
  </div>

  <div class="card">
    <h3>Past Kitty Parties</h3>
    <div class="card">
      <button class="btn btn-primary" onclick="togglePast()">
        View Past Parties
      </button>

      <div id="pastContainer" style="display:none; margin-top:20px;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBkHKgkRPNarkeR2451Ru6Kl0NC87J7aM8",
      authDomain: "kittypartymanager.firebaseapp.com",
      projectId: "kittypartymanager",
      storageBucket: "kittypartymanager.firebasestorage.app",
      messagingSenderId: "441188948922",
      appId: "1:441188948922:web:ec4771ac0c1d09b2a79b83",
      measurementId: "G-8DQ68SKFJV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const members = ["Aparna", "Sunita", "Savita", "Pooja"];

    const container = document.getElementById("membersContainer");
    const totalDisplay = document.getElementById("totalAmount");

    members.forEach(member => {
      const row = document.createElement("div");
      row.className = "member-row";
      row.innerHTML = `
      <div>${member}</div>
      <input type="number" min="0" placeholder="₹ Amount" id="${member}" oninput="calculateTotal()">
    `;
      container.appendChild(row);
    });

    window.calculateTotal = function () {
      let total = 0;
      members.forEach(member => {
        const val = document.getElementById(member).value;
        total += Number(val) || 0;
      });
      totalDisplay.textContent = total;
    };

    window.saveParty = async function () {
      const date = document.getElementById("partyDate").value;
      const todayDate = new Date().toISOString().split('T')[0];
      if (date > todayDate) return alert("Date cannot be in the future.");
      if (!date) return alert("Please select date.");

      let partyData = { date: date, members: [] };

      members.forEach(member => {
        const amount = document.getElementById(member).value || 0;
        console.log("amount", amount)
        if (amount || Number(amount) >= 0) {
          partyData.members.push({
            name: member,
            amount: Number(amount)
          });
        }
      });

      await addDoc(collection(db, "kittyParties"), partyData);
      // alert("Saved to cloud 🎉");
      location.reload();
    };

    async function loadParties() {
      const pastContainer = document.getElementById("pastContainer");
      pastContainer.innerHTML = "";

      const querySnapshot = await getDocs(collection(db, "kittyParties"));

      querySnapshot.forEach((docSnap) => {
        const party = docSnap.data();
        let total = 0;

        let membersList = party.members.map(m => {
          total += m.amount;
          return `<li>${m.name} - ₹${m.amount}</li>`;
        }).join("");

        const div = document.createElement("div");
        div.className = "past-entry";

        div.innerHTML = `
        <strong>Date:</strong> ${party.date}
        <ul>${membersList}</ul>
        <strong>Total:</strong> ₹${total}<br>
        <button class="btn-danger" onclick="deleteParty('${docSnap.id}')">Delete</button>
      `;

        pastContainer.appendChild(div);
      });
    }
    let pastVisible = false;

    window.togglePast = async function () {
      const pastContainer = document.getElementById("pastContainer");

      if (!pastVisible) {
        pastContainer.style.display = "block";
        pastContainer.innerHTML = "<p>Loading...</p>";
        await loadParties();
        pastVisible = true;
      } else {
        pastContainer.style.display = "none";
        pastVisible = false;
      }
    };
    window.deleteParty = async function (id) {
      if (!confirm("Are you sure you want to delete this party?")) return;
      await deleteDoc(doc(db, "kittyParties", id));
      location.reload();
    };

    loadParties();
  </script>

</body>

</html>
